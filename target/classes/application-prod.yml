server:
  tomcat:
    max-connections: 200
    threads:
      max: 100
      min-spare: 10
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  error:
    include-stacktrace: never
    include-message: never

spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 5000
      leak-detection-threshold: 30000

addon:
  outbound:
    allow-http: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.httpactions: INFO
